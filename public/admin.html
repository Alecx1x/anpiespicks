<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AnpiesPicks · Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/favicon-admin.svg">
<style>
  :root { --bg:#0b1020; --card:#151b30; --line:#243049; --txt:#e5e7eb; --mut:#94a3b8; --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --blue:#2563eb; }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  header{padding:1rem 1.2rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
  h1{font-size:1.2rem;margin:0}
  nav{display:flex;gap:.3rem;flex-wrap:wrap}
  nav button{background:transparent;color:var(--mut);border:1px solid transparent;border-radius:.5rem;padding:.45rem .8rem;cursor:pointer;font-size:.95rem}
  nav button.active{background:var(--card);color:var(--txt);border-color:var(--line)}
  main{padding:1.2rem;max-width:1100px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:.8rem;padding:1rem;margin:.7rem 0}
  .grid{display:grid;gap:.7rem}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:.8rem;padding:1rem;text-align:center}
  .kpi b{font-size:1.8rem;display:block}
  .kpi small{color:var(--mut)}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  th,td{text-align:left;padding:.45rem .5rem;border-bottom:1px solid var(--line)}
  th{color:var(--mut);font-weight:600}
  input,select,textarea{background:#0e1426;color:var(--txt);border:1px solid var(--line);border-radius:.5rem;padding:.4rem .5rem;font-size:.9rem;width:100%}
  textarea{min-height:38px;resize:vertical}
  .btn{background:var(--blue);color:#fff;border:none;border-radius:.5rem;padding:.45rem .8rem;cursor:pointer;font-size:.9rem}
  .btn.sm{padding:.25rem .5rem;font-size:.8rem}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .btn.danger{background:var(--bad)}
  .muted{color:var(--mut)}
  .flex{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
  .pill{font-size:.7rem;padding:.1rem .45rem;border-radius:1rem;border:1px solid var(--line);color:var(--mut)}
  .ok{color:var(--good)} .bad{color:var(--bad)} .warn{color:var(--warn)}
  code{background:#0e1426;padding:.15rem .4rem;border-radius:.3rem}
  .toast{position:fixed;bottom:1rem;right:1rem;background:var(--good);color:#04210f;padding:.6rem 1rem;border-radius:.6rem;opacity:0;transition:.3s;font-weight:600}
  .toast.show{opacity:1}
  h3{margin:.2rem 0 .6rem}
  .sortwrap{display:grid;grid-template-columns:1fr;gap:.8rem}
  @media(min-width:760px){.sortwrap{grid-template-columns:repeat(3,1fr)}}
  .sortcol{background:#0e1426;border:1px solid var(--line);border-radius:.7rem;padding:.6rem}
  .sorthead{font-weight:600;font-size:.95rem;margin:.1rem .1rem .5rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
  .drop{min-height:96px;border:2px dashed transparent;border-radius:.5rem;transition:border-color .15s,background .15s}
  .drop.drag{border-color:var(--good);background:rgba(34,197,94,.08)}
  .ph{grid-column:1/-1;color:var(--mut);text-align:center;font-size:.82rem;padding:1.6rem .5rem;border:2px dashed var(--line);border-radius:.5rem}
  .pgal{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:.5rem}
  .pgal .it{background:#11182b;border:1px solid var(--line);border-radius:.5rem;overflow:hidden;cursor:grab}
  .pgal .it:active{cursor:grabbing}
  .pgal .it img{width:100%;height:84px;object-fit:cover;display:block;pointer-events:none}
  .pgal .it .cap{display:flex;gap:.25rem;padding:.3rem;justify-content:center;flex-wrap:wrap}
  .pgal .it .cap .btn{padding:.15rem .4rem;font-size:.8rem;line-height:1.1}
  /* ---- inline cropper ---- */
  .cropModal{display:none;position:fixed;inset:0;z-index:100}
  .cropModal.show{display:block}
  .cropBackdrop{position:absolute;inset:0;background:rgba(0,0,0,.82)}
  .cropPanel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--card);
    border:1px solid var(--line);border-radius:.8rem;padding:1rem;display:flex;flex-direction:column;gap:.7rem;max-width:94vw;max-height:94vh}
  .cropHead{display:flex;justify-content:space-between;align-items:center;font-weight:600}
  .cropTools{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
  .cropStage{position:relative;line-height:0;touch-action:none;user-select:none;-webkit-user-select:none;overflow:hidden;margin:0 auto}
  .cropStage img{max-width:86vw;max-height:66vh;display:block;-webkit-user-drag:none}
  .cropBox{position:absolute;border:2px solid var(--good);box-shadow:0 0 0 9999px rgba(0,0,0,.5);box-sizing:border-box;cursor:move}
  .cropBox .ch{position:absolute;width:18px;height:18px;background:var(--good);border-radius:50%;border:2px solid #04210f}
  .ch.tl{left:-10px;top:-10px;cursor:nwse-resize}.ch.tr{right:-10px;top:-10px;cursor:nesw-resize}
  .ch.bl{left:-10px;bottom:-10px;cursor:nesw-resize}.ch.br{right:-10px;bottom:-10px;cursor:nwse-resize}
  .cropFoot{display:flex;justify-content:flex-end;gap:.5rem}
</style>
</head>
<body>
<header>
  <h1>🎯 AnpiesPicks</h1>
  <nav>
    <button data-tab="overview" class="active">Overview</button>
    <button data-tab="books">Books &amp; Offers</button>
    <button data-tab="legal">Legality</button>
    <button data-tab="links">Links</button>
    <button data-tab="people">People</button>
    <button data-tab="grow">Grow</button>
    <button data-tab="plan">Plan</button>
    <button data-tab="promos">Promos</button>
    <button data-tab="picks">Picks</button>
    <button data-tab="content">Content</button>
    <button data-tab="conv">Conversions</button>
  </nav>
  <span class="muted" style="margin-left:auto;font-size:.8rem">Lock this page with Cloudflare Access before deploying.</span>
</header>
<main>
  <section id="overview"></section>
  <section id="books" hidden></section>
  <section id="legal" hidden></section>
  <section id="links" hidden></section>
  <section id="people" hidden></section>
  <section id="grow" hidden></section>
  <section id="plan" hidden></section>
  <section id="promos" hidden></section>
  <section id="picks" hidden></section>
  <section id="content" hidden></section>
  <section id="conv" hidden></section>
</main>
<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const api = (u,opt) => fetch(u,opt).then(r=>{ if(r.status===401||r.status===503){ location.href='/login'; return new Promise(()=>{}); } return r.json(); });
let DATA = { books:[], offers:[], links:[] };
let PLAN_IMG = '';
let PICKS_DATA = [], SHARE_PICK = null;
const STATES = "AL AK AZ AR CA CO CT DE DC FL GA HI ID IL IN IA KS KY LA ME MD MA MI MN MS MO MT NE NV NH NJ NM NY NC ND OH OK OR PA RI SC SD TN TX UT VT VA WA WV WI WY".split(" ");
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
function offerFor(id){return DATA.offers.find(o=>o.book_id===id)||{};}

// ---- tabs ----
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  ['overview','books','legal','links','people','grow','plan','promos','picks','content','conv'].forEach(id=>$('#'+id).hidden=(id!==b.dataset.tab));
  render(b.dataset.tab);
});

async function loadBooks(){ DATA = await api('/api/admin/books'); }

// ---- OVERVIEW ----
async function render(tab){
  if(tab==='overview') return renderOverview();
  if(tab==='books') return renderBooks();
  if(tab==='legal') return renderLegal();
  if(tab==='links') return renderLinks();
  if(tab==='people') return renderPeople();
  if(tab==='grow') return renderGrow();
  if(tab==='plan') return renderPlan();
  if(tab==='promos') return renderPromos();
  if(tab==='picks') return renderPicks();
  if(tab==='content') return renderContent();
  if(tab==='conv') return renderConv();
}
async function renderOverview(){
  const [s, pr, ev, settings] = await Promise.all([api('/api/admin/stats'), api('/api/admin/people'), api('/api/admin/events'), api('/api/admin/settings')]);
  const t = s.totals||{};
  const people = pr.people||[];
  const events = ev.events||[];
  const urlsSet = DATA.books.filter(b=>b.referral_url).length;
  const plans = people.map(planFor).filter(Boolean).sort((a,b)=>a.priority-b.priority);
  const upcoming = events.filter(e=>{const d=daysUntil(e.date); return d>=0 && d<=14;});
  const dow = new Date().getDay();
  const check=(ok,txt)=>`<div style="padding:.15rem 0">${ok?'✅':'⬜'} ${txt}</div>`;
  // goal + projection
  const goal = parseFloat(settings.monthly_goal||'0')||0;
  const earnedMonth = t.earned_month||0;
  const now=new Date(), dom=now.getDate(), dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const projected = dom>0? earnedMonth/dom*dim : 0;
  const pct = goal>0? Math.min(100, Math.round(earnedMonth/goal*100)) : 0;
  const goalHtml = goal>0
    ? `<div class="card"><h3>🎯 This month: $${earnedMonth.toFixed(0)} / $${goal.toFixed(0)}</h3>
        <div style="background:#0e1426;border:1px solid var(--line);border-radius:1rem;height:14px;overflow:hidden"><div style="height:100%;width:${pct}%;background:#22c55e"></div></div>
        <p class="muted" style="margin-top:.4rem">${pct}% there · on pace for ~$${projected.toFixed(0)} by month end · <button class="btn sm ghost" onclick="gotoTab('grow')">change goal</button></p></div>`
    : `<div class="card"><h3>🎯 Set a monthly goal</h3><p class="muted">Give yourself a target to aim at — it'll show your progress + projected payout here. <button class="btn sm" onclick="gotoTab('grow')">Set a goal →</button></p></div>`;

  const weekendHtml = [5,6,0].includes(dow) ? `<div style="margin-bottom:.6rem">🏈 <b>It's the weekend — peak sports time.</b> Good day to send links and post your share link.</div>` : '';
  const eventsHtml = upcoming.map(e=>`<div style="margin-bottom:.5rem">📅 <b>${e.name}</b> in ${daysUntil(e.date)}d <span class="muted">(${e.date})</span> — high-intent window, push your ${e.sport||'sports'} apps. <button class="btn sm ghost" onclick="copy(location.origin+'/smart?channel=event')">copy share link</button></div>`).join('');
  const plansHtml = plans.map(p=>`
    <div style="border-top:1px solid var(--line);padding:.6rem 0">
      <div>${p.icon} <b>${p.label}</b> — ${p.person} <span class="muted">(${p.book_name})</span></div>
      <div class="flex" style="margin-top:.35rem">
        ${p.msg?`<button class="btn sm" data-msg="${esc(p.msg)}" onclick="copyMsg(this)">copy message</button>`:''}
        <button class="btn sm ghost" onclick="copy('${p.url}')">copy link</button>
        <button class="btn sm ghost" onclick="gotoTab('people')">update stage →</button>
      </div>
    </div>`).join('');
  const hasAny = weekendHtml || eventsHtml || plansHtml;

  // ---- "What's working" panel (renders data /api/admin/stats already returns) ----
  const wByChannel=s.byChannel||[], wByState=s.byState||[], wFunnel=s.funnel||[];
  const wByBook=(s.byBook||[]).filter(b=>(b.clicks||0)>0||(b.signups||0)>0||(b.earned||0)>0);
  const maxCh=Math.max(1,...wByChannel.map(x=>x.clicks||0));
  const maxSt=Math.max(1,...wByState.map(x=>x.clicks||0));
  const wbar=(label,val,max,color)=>`<div style="display:flex;align-items:center;gap:.5rem;margin:.28rem 0">
    <div class="muted" style="width:84px;flex:0 0 auto;font-size:.82rem;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(label)}</div>
    <div style="flex:1;background:#0e1426;border:1px solid var(--line);border-radius:.4rem;overflow:hidden;height:16px"><div style="height:100%;width:${Math.max(4,Math.round((val/max)*100))}%;background:${color||'#2563eb'}"></div></div>
    <div style="flex:0 0 auto;font-size:.82rem;font-variant-numeric:tabular-nums">${val}</div></div>`;
  const fOrder=['signup','deposit','wager','bonus_posted','paid'];
  const fMap=Object.fromEntries(wFunnel.map(f=>[f.stage,f.n]));
  const funnelHtml=fOrder.map(st=>`<div style="text-align:center;flex:1"><b style="display:block;font-size:1.3rem">${fMap[st]||0}</b><small class="muted" style="font-size:.66rem">${st.replace('_',' ')}</small></div>`).join('<div class="muted" style="align-self:center">→</div>');
  const worksHtml = `
    <div class="card"><h3>📈 What's working <span class="muted" style="font-weight:400;font-size:.8rem">— where your clicks &amp; money come from</span></h3>
    ${(t.clicks||0)>0 ? `
      <div class="row2" style="gap:1.2rem">
        <div><div class="muted" style="font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem">Clicks by channel</div>
          ${wByChannel.length?wByChannel.map(x=>wbar(x.channel,x.clicks||0,maxCh,'#33B96A')).join(''):'<p class="muted" style="font-size:.85rem">—</p>'}</div>
        <div><div class="muted" style="font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem">Top states</div>
          ${wByState.length?wByState.slice(0,6).map(x=>wbar(x.state,x.clicks||0,maxSt,'#2DD1C4')).join(''):'<p class="muted" style="font-size:.85rem">—</p>'}</div>
      </div>
      ${wByBook.length?`<div class="muted" style="font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;margin:.9rem 0 .3rem">By app</div>
      <table><tr><th>App</th><th>Clicks</th><th>Signups</th><th>Earned</th></tr>
      ${wByBook.map(b=>`<tr><td>${esc(b.name)}</td><td>${b.clicks||0}</td><td>${b.signups||0}</td><td>$${(b.earned||0).toFixed(0)}</td></tr>`).join('')}</table>`:''}
      <div class="muted" style="font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;margin:.9rem 0 .3rem">Funnel</div>
      <div class="flex" style="justify-content:space-between;background:#0e1426;border:1px solid var(--line);border-radius:.6rem;padding:.7rem .5rem">${funnelHtml}</div>
    ` : `<p class="muted">No clicks yet. The moment you share a link, this shows <b>which channel</b>, <b>which state</b>, and <b>which app</b> are actually working — so you know where to double down instead of guessing.</p>`}
    </div>`;

  $('#overview').innerHTML = `
    <div class="card" style="border-color:#2563eb">
      🔒 <b>Your private command center.</b> <span class="muted">Only you see this page — it's behind your password. The public only sees the landing page.</span>
    </div>

    ${goalHtml}

    <div class="card"><h3>☀️ Today's plays${plans.length?` <span class="pill">${plans.length} to do</span>`:''}</h3>
      ${weekendHtml}${eventsHtml}${plansHtml}
      ${hasAny?'':`<p class="muted">Nothing needs you right now. Send a link below — when someone clicks but doesn't sign up, the nudge to follow up shows up here automatically.</p>`}
    </div>

    <div class="card"><h3>📨 Refer someone in 10 seconds</h3>
      <p class="muted">Pick a book + name → get their personal link AND a ready-to-send message.</p>
      <div class="flex">
        <label>Book<select id="ccBook">${DATA.books.filter(b=>b.referral_url).map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select></label>
        <label>Person<input id="ccName" placeholder="Jake"></label>
        <button class="btn" onclick="ccRefer()">Make link + message</button>
      </div>
      <div id="ccOut" style="margin-top:.7rem"></div>
    </div>

    <div class="card"><h3>📣 Or share with everyone at once</h3>
      <p class="muted">One link that auto-sends each person to the best app for their state. Put it in your bio or group chats.</p>
      <div class="flex"><code id="ccSmart">${origin()}/smart?channel=social</code><button class="btn sm" onclick="copy($('#ccSmart').textContent)">copy</button></div>
    </div>

    <div class="grid kpis">
      <div class="kpi"><b>${t.clicks||0}</b><small>clicks</small></div>
      <div class="kpi"><b>${t.signups||0}</b><small>signups</small></div>
      <div class="kpi"><b>$${(t.earned||0).toFixed(0)}</b><small>earned</small></div>
      <div class="kpi"><b>$${(t.pending||0).toFixed(0)}</b><small>pending</small></div>
    </div>

    ${worksHtml}

    <div class="card"><h3>🚀 Getting started</h3>
      ${check(urlsSet>0, `Add your referral links — <b>${urlsSet}/${DATA.books.length}</b> done <span class="muted">(Links tab)</span>`)}
      ${check((t.clicks||0)>0, 'Share your first link')}
      ${check((t.signups||0)>0, 'Get your first signup')}
      ${check((t.earned||0)>0, 'Earn your first bonus 💰')}
    </div>

    <details class="card"><summary style="cursor:pointer"><b>📖 How to get your first referrals (novice playbook)</b></summary>
      <ol class="muted" style="line-height:1.7;margin:.5rem 0">
        <li><b>Start with people who already watch sports</b> — friends, family, group chats, your fantasy league. They're who'll actually use these apps.</li>
        <li><b>Lead with "we BOTH get free money."</b> It costs them nothing and they get a bonus too. Use the message generator above.</li>
        <li><b>Send each person their OWN link</b> (the box above) — that's how you know who actually used it.</li>
        <li><b>Push one or two apps, not all 17.</b> Easier to explain, less spammy.</li>
        <li><b>Drop your share link where sports fans are</b> — your story/bio, a league chat, a Discord. Don't spam subreddits that ban referral links.</li>
        <li><b>Always disclose it's a referral link.</b> It's the law, and it actually converts better.</li>
        <li><b>Follow up.</b> Most signups happen after a reminder — this page tells you who to nudge.</li>
      </ol>
    </details>`;
}
async function ccRefer(){
  const book_id=$('#ccBook').value, person=$('#ccName').value.trim();
  if(!person) return toast('name required');
  const r=await api('/api/admin/refer',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({book_id,person})});
  if(!r.slug) return;
  const url=origin()+'/go/'+r.slug;
  $('#ccOut').innerHTML=`
    <div>📎 ${person}'s link: <code>${url}</code> <button class="btn sm" onclick="copy('${url}')">copy</button> <button class="btn sm ghost" onclick="showQR('${url}')">QR</button></div>
    <label style="display:block;margin-top:.5rem">✍️ Message (edit if you like):
      <textarea id="ccMsg" style="min-height:80px">${messageFor(book_id,person,url)}</textarea></label>
    <button class="btn" onclick="copy($('#ccMsg').value)">copy message</button>`;
  $('#ccName').value='';
}
function messageFor(bookId, person, url){
  const b=DATA.books.find(x=>x.id===bookId)||{};
  const o=DATA.offers.find(x=>x.book_id===bookId)||{};
  const theirs=(o.referee_bonus && !/unverified|tbd|verify/i.test(o.referee_bonus))?o.referee_bonus:'a signup bonus';
  return `Hey ${person}! I've been using ${b.name} for sports picks 🏈 — if you sign up with my link we BOTH get a bonus (you get ${theirs}). Takes 2 min. Here's your link: ${url}`;
}

// ---- follow-up cadence (Today's plays) ----
function daysSince(ts){ if(!ts) return Infinity; const d=new Date(String(ts).replace(' ','T')+'Z'); return (Date.now()-d.getTime())/86400000; }
function daysUntil(dateStr){ const d=new Date(dateStr+'T12:00:00'); const n=new Date(); n.setHours(0,0,0,0); return Math.round((d-n)/86400000); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function copyMsg(btn){ copy(btn.dataset.msg); }
function gotoTab(name){ const b=document.querySelector(`nav button[data-tab="${name}"]`); if(b) b.click(); }
function qrUrl(u){ return 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=10&data='+encodeURIComponent(u); }
function showQR(u){ window.open(qrUrl(u),'_blank'); }

// ---- image upload from phone (compress in-browser, store in DB, get /img URL) ----
function compressImage(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{ URL.revokeObjectURL(url);
      let w=img.width, h=img.height;
      if(w>=h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
      else if(h>w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      let q=quality, out=cv.toDataURL('image/jpeg',q);
      while(out.length>900000 && q>0.4){ q-=0.15; out=cv.toDataURL('image/jpeg',q); }
      resolve(out);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('load failed')); };
    img.src=url;
  });
}
function pickImage(onDone){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=async()=>{ const f=inp.files&&inp.files[0]; if(!f) return;
    toast('Processing image…');
    try{
      const dataUrl=await compressImage(f,1080,0.7);
      const r=await api('/api/admin/images',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({data:dataUrl})});
      if(r&&r.url){ toast('Image uploaded'); onDone(origin()+r.url, r.url); }
      else toast((r&&r.error)||'Upload failed');
    }catch(e){ toast('Could not read image'); }
  };
  inp.click();
}
// ---- multi-image upload (compress each, store in DB) → array of full /img URLs ----
async function uploadOneFile(file){
  const dataUrl=await compressImage(file,1080,0.7);
  const r=await api('/api/admin/images',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({data:dataUrl})});
  return (r&&r.url)?origin()+r.url:null;
}
// Upload many image files into a bucket (default 'inbox'); each is compressed + stored
async function uploadProofFiles(fileList, kind){
  const files=[...(fileList||[])].filter(f=>f.type&&f.type.startsWith('image/'));
  if(!files.length){ toast('No images selected'); return 0; }
  let ok=0, i=0;
  for(const f of files){
    i++; toast(`Uploading ${i}/${files.length}…`);
    try{
      const url=await uploadOneFile(f);
      if(!url){ continue; }
      const r=await api('/api/admin/proofs',{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({kind:kind||'inbox', image_url:url})});
      if(!(r&&r.error)) ok++;
    }catch(e){ /* skip a bad file, keep going */ }
  }
  toast(ok?`Uploaded ${ok} image${ok>1?'s':''}`:'Upload failed');
  if(ok) renderPicks();
  return ok;
}
// multi-file picker (no labels) — lands everything in the Unsorted tray
function pickProofFiles(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.multiple=true;
  inp.onchange=()=>{ if(inp.files&&inp.files.length) uploadProofFiles(inp.files,'inbox'); };
  inp.click();
}
// move an uploaded image to a different bucket
async function setProofKind(id,kind){
  const r=await api('/api/admin/proofs/'+id,{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify({kind})});
  if(r&&r.error) return toast(r.error);
  renderPicks();
}
// ---- drag-to-sort between buckets (and OS file-drop) ----
let DRAG_PROOF=null;
function proofDragStart(ev,id){ DRAG_PROOF=id; try{ev.dataTransfer.effectAllowed='move';ev.dataTransfer.setData('text/plain',String(id));}catch(e){} }
function wireProofZone(id){
  const z=document.getElementById(id); if(!z||z._wired) return; z._wired=true;
  const stop=e=>{e.preventDefault();e.stopPropagation();};
  ['dragenter','dragover'].forEach(ev=>z.addEventListener(ev,e=>{stop(e); try{e.dataTransfer.dropEffect=DRAG_PROOF!=null?'move':'copy';}catch(_){} z.classList.add('drag');}));
  ['dragleave','dragend'].forEach(ev=>z.addEventListener(ev,e=>{ if(e.target===z) z.classList.remove('drag'); }));
  z.addEventListener('drop',e=>{ stop(e); z.classList.remove('drag');
    const kind=z.dataset.kind;
    const files=e.dataTransfer&&e.dataTransfer.files;
    if(DRAG_PROOF!=null){ const moved=DRAG_PROOF; DRAG_PROOF=null; setProofKind(moved,kind); }
    else if(files&&files.length){ uploadProofFiles(files,kind); }
  });
}

function planFor(p){
  const url=origin()+'/go/'+p.slug;
  const dC=daysSince(p.last_click), dV=daysSince(p.last_conv_at), dM=daysSince(p.created_at);
  const b=DATA.books.find(x=>x.id===p.book_id)||{name:p.book_name};
  const o=DATA.offers.find(x=>x.book_id===p.book_id)||{};
  const act=(o.required_action && !/tbd|verify/i.test(o.required_action))?o.required_action:'finish the last step';
  if(p.stage==='paid') return null;
  if(p.stage==='bonus_posted') return dV>=7?mk(3,'⏳','Confirm bonus paid out',p,url,''):null;
  if(p.stage==='wager'||p.stage==='deposit') return dV>=2?mk(1,'🟠','Remind to finish',p,url,`Almost there on ${b.name}! Once you ${String(act).toLowerCase()}, the bonus drops for both of us 🙌 Need help?`):null;
  if(p.stage==='signup') return dV>=2?mk(1,'🟠','Nudge to deposit',p,url,`Hey ${p.person}! You're signed up on ${b.name} — just make your first deposit and the bonus unlocks for both of us. Want me to walk you through it?`):null;
  if((p.clicks||0)>0) return dC>=1?mk(0,'🔴','Clicked, no signup — follow up',p,url,`Hey ${p.person}, saw you checked out ${b.name} 👀 finish signing up with my link and we both get the bonus. Here it is again: ${url}`):null;

}

    title: `${E?E+' — ':''}${app} sign-up bonus (referral)`,
    body: `Sharing my referral link for ${app} — sign up and we both get a bonus (you get ${theirs}). Full disclosure: it's a referral link. 21+ (18+ where allowed), please bet responsibly. My tracked record + offer details are on my page.` };

function ensureCropModal(){
  if(document.getElementById('cropModal')) return;

  m.innerHTML=`<div class="cropBackdrop" onclick="closeCrop()"></div>

        <button class="btn sm ghost" onclick="replaceImage()" title="Swap in a different photo">🔁 Replace</button>

        <img id="cropImg" alt="">

          <span class="ch tl" data-h="tl"></span><span class="ch tr" data-h="tr"></span>

    </div>`;
  document.body.appendChild(m);

function initCropBox(){
  const img=document.getElementById('cropImg'); if(!CROP) return;
  const w=img.clientWidth, h=img.clientHeight;
  const bw=Math.round(w*0.8), bh=Math.round(h*0.8);
  CROP.box={x:Math.round((w-bw)/2), y:Math.round((h-bh)/2), w:bw, h:bh};
  CROP.dispW=w; CROP.dispH=h; CROP.natW=img.naturalWidth; CROP.natH=img.naturalHeight;
  drawCropBox();
}
function drawCropBox(){ const b=CROP&&CROP.box; if(!b) return; const el=document.getElementById('cropBox');
  el.style.left=b.x+'px'; el.style.top=b.y+'px'; el.style.width=b.w+'px'; el.style.height=b.h+'px'; }
function openCrop(id,url){
  ensureCropModal();
  CROP={id,url,box:null};
  const img=document.getElementById('cropImg');
  img.onload=initCropBox;
  img.src=url;                                   // same-origin /img/N → canvas stays untainted
  if(img.complete && img.naturalWidth) initCropBox();
  document.getElementById('cropModal').classList.add('show');
}
function resetCrop(){ initCropBox(); }
// rotate the working image 90° (dir: -1 left / +1 right) by re-rendering through a canvas
function rotateCrop(dir){
  if(!CROP) return;
  const img=document.getElementById('cropImg');
  const w=img.naturalWidth, h=img.naturalHeight; if(!w||!h) return;
  const cv=document.createElement('canvas'); cv.width=h; cv.height=w;
  const ctx=cv.getContext('2d');
  ctx.translate(cv.width/2, cv.height/2);
  ctx.rotate((dir>0?90:-90)*Math.PI/180);
  ctx.drawImage(img, -w/2, -h/2);
  img.onload=initCropBox;
  img.src=cv.toDataURL('image/jpeg',0.92);   // becomes the new working image (untainted data URL)
}

function closeCrop(){ const m=document.getElementById('cropModal'); if(m) m.classList.remove('show'); CROP=null; }
function wireCropInteractions(){
  const box=document.getElementById('cropBox');
  let mode=null, sx=0, sy=0, start=null;
  const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
  function down(e){
    if(!CROP||!CROP.box) return;
    mode=(e.target&&e.target.dataset&&e.target.dataset.h)||'move';
    sx=e.clientX; sy=e.clientY; start=Object.assign({},CROP.box);
    e.preventDefault(); e.stopPropagation();
    try{ box.setPointerCapture(e.pointerId); }catch(_){}
    document.addEventListener('pointermove',move); document.addEventListener('pointerup',up);
  }
  function move(e){
    if(!mode||!CROP) return;
    const dx=e.clientX-sx, dy=e.clientY-sy, W=CROP.dispW, H=CROP.dispH, MIN=24;
    let {x,y,w,h}=start;
    if(mode==='move'){ x=clamp(start.x+dx,0,W-w); y=clamp(start.y+dy,0,H-h); }
    else {
      if(mode.indexOf('l')>=0){ const nx=clamp(start.x+dx,0,start.x+start.w-MIN); w=start.w+(start.x-nx); x=nx; }
      if(mode.indexOf('r')>=0){ w=clamp(start.w+dx,MIN,W-start.x); }
      if(mode.indexOf('t')>=0){ const ny=clamp(start.y+dy,0,start.y+start.h-MIN); h=start.h+(start.y-ny); y=ny; }
      if(mode.indexOf('b')>=0){ h=clamp(start.h+dy,MIN,H-start.y); }
    }
    CROP.box={x:Math.round(x),y:Math.round(y),w:Math.round(w),h:Math.round(h)}; drawCropBox();
  }
  function up(){ mode=null; document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); }
  box.addEventListener('pointerdown',down);
}
async function saveCrop(){
  if(!CROP||!CROP.box) return;
  const img=document.getElementById('cropImg');
  const fx=CROP.natW/CROP.dispW, fy=CROP.natH/CROP.dispH, b=CROP.box;
  const cw=Math.max(1,Math.round(b.w*fx)), ch=Math.max(1,Math.round(b.h*fy));
  const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
  cv.getContext('2d').drawImage(img, Math.round(b.x*fx),Math.round(b.y*fy),cw,ch, 0,0,cw,ch);
  let q=0.85, out=cv.toDataURL('image/jpeg',q);
  while(out.length>900000 && q>0.4){ q-=0.15; out=cv.toDataURL('image/jpeg',q); }
  const btn=document.getElementById('cropSave'); btn.disabled=true; btn.textContent='Saving…';
  const id=CROP.id;
  try{
    const up=await api('/api/admin/images',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({data:out})});
    if(!up||!up.url){ toast('Crop upload failed'); }
    else{
      const r=await api('/api/admin/proofs/'+id,{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify({image_url:origin()+up.url})});
      toast((r&&r.error)?r.error:'Cropped & saved');
    }
  }catch(e){ toast('Could not save crop'); }
  btn.disabled=false; btn.textContent='Save crop';
  closeCrop(); renderPicks();
}

    await api('/api/admin/picks/'+id,{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify({proof_url:u})});
    toast('Screenshot attached'); renderPicks();
  });
}
async function delPick(id){ if(!confirm('Delete this pick? (Deleting losers defeats the purpose — only do this for mistakes.)'))return;
  await api('/api/admin/picks/'+id,{method:'DELETE'}); renderPicks(); }

// ---- one-tap share to socials (composer lives in the Picks tab "Share & promote" card) ----
function composePickPost(p){
  const odds = p.odds!=null ? ` ${p.odds>0?'+':''}${p.odds}` : '';
  const tag  = p.sport ? p.sport : 'New';
  const why  = p.analysis ? `\n${p.analysis}` : '';
  return `🎯 ${tag} pick: ${p.selection}${odds}${p.event?` — ${p.event}`:''}${why}\n\nTailing? Every play's logged with a verified record. Sign up on the apps I use with my link & we both get a bonus 👇\n21+ · #ad`;
}
function shareLinkFor(platform){
  const what = ($('#shareWhat')||{}).value || 'general';
  if(what==='record') return origin()+'/record';
  return origin()+'/smart?channel='+(platform||'social');
}
function shareDefaultText(){
  const what = ($('#shareWhat')||{}).value || 'general';
  if(what==='record') return `📊 My verified sports-betting track record — every pick logged before the event, wins AND losses shown, nothing deleted. Take a look 👇\n21+`;
  if(what.indexOf('pick:')===0){
    const p=(PICKS_DATA||[]).find(x=>x.id===+what.split(':')[1]);
    if(p) return composePickPost(p);
  }
  return `🎯 I post sports picks with a verified, timestamped record — wins AND losses, nothing hidden. Sign up on the apps I use with my link & we both grab a bonus 👇\n21+ · #ad`;
}
function shareFill(){ const el=$('#shareBody2'); if(el) el.value=shareDefaultText(); }
function shareSection(platform){
  const ta=$('#shareBody2'); if(!ta) return;
  const body=ta.value.trim();
  if(platform==='copy'){ copy(body+String.fromCharCode(10)+shareLinkFor('social')); return; }
  const what=($('#shareWhat')||{}).value||'general';
  let title='My sports picks';
  if(what.indexOf('pick:')===0){ const p=(PICKS_DATA||[]).find(x=>x.id===+what.split(':')[1]); if(p) title=`${p.selection}${p.odds!=null?` ${p.odds>0?'+':''}${p.odds}`:''} — my pick`; }
  else if(what==='record') title='My verified sports-betting track record';
  openPost({platform, body, link:shareLinkFor(platform), title});  // X/Reddit pre-fill; IG/TikTok copy + open app
}
// per-pick 📣 button → load that pick into the Share card and scroll to it
function sharePick(id){
  const sel=$('#shareWhat'); if(sel){ sel.value='pick:'+id; shareFill(); }
  const ta=$('#shareBody2'); if(ta) ta.scrollIntoView({behavior:'smooth', block:'center'});
  toast('Loaded into Share — pick a platform');
}

// ---- CONTENT (blog articles) ----
let EDIT_ART = null; // null = list view; {} = new; {id,...} = editing
async function renderContent(){
  const sec=$('#content');
  if(EDIT_ART===null){
    const d=await api('/api/admin/articles'); const arts=d.articles||[];
    const rows=arts.map(a=>`<tr>
      <td><b>${esc(a.title)}</b>${a.dek?`<div class="muted" style="font-size:.8rem">${esc(a.dek)}</div>`:''}<div class="muted" style="font-size:.75rem">/blog/${esc(a.slug)}</div></td>
      <td>${a.status==='published'?'<span class="ok">● published</span>':'<span class="muted">○ draft</span>'}</td>
      <td class="muted" style="font-size:.8rem;white-space:nowrap">${a.published_at?String(a.published_at).slice(0,10):'—'}</td>
      <td style="white-space:nowrap">
        ${a.status==='published'?`<a class="btn sm ghost" href="/blog/${esc(a.slug)}" target="_blank">view</a> `:''}
        <button class="btn sm" onclick="editArticle(${a.id})">edit</button>
        <button class="btn sm danger" onclick="delArticle(${a.id},'${escJs(a.title)}')">✕</button>
      </td></tr>`).join('');
    sec.innerHTML=`
      <div class="card" style="border-color:#7c3aed">📝 <b>Blog / content</b> — <span class="muted">posts go live at <a class="lnk" href="/blog" target="_blank">/blog</a>. Each one is a real, Google-indexable page that links into your bonus funnel — your slow-burn traffic engine. Write narrow, specific posts (e.g. "How the DraftKings Ohio bonus playthrough actually works").</span></div>
      <div class="card"><div class="flex" style="justify-content:space-between"><h3 style="margin:0">Your posts</h3><button class="btn" onclick="newArticle()">＋ New post</button></div>
        ${arts.length?`<table style="margin-top:.6rem"><tr><th>Post</th><th>Status</th><th>Published</th><th></th></tr>${rows}</table>`:'<p class="muted" style="margin-top:.6rem">No posts yet. Tap <b>＋ New post</b> to write your first — even one solid state-bonus guide gives Google something to index.</p>'}
      </div>
      <details class="card"><summary style="cursor:pointer"><b>💡 What to write (high-leverage ideas)</b></summary>
        <ul class="muted" style="line-height:1.7;margin-top:.5rem">
          <li><b>State bonus guides:</b> "Best sportsbook bonuses in Ohio right now" — link to <code>/bonuses/oh</code>. One per state you care about.</li>
          <li><b>Playthrough explainers:</b> "What '$200 in bonus bets' really means" — the searches with buyer intent.</li>
          <li><b>Comparisons:</b> "DraftKings vs FanDuel sign-up bonus — which is actually bigger?"</li>
          <li><b>Launch news:</b> "[State] just went live — first apps to grab" — timely, low competition.</li>
          <li>Always end a post linking to <code>/bonuses</code> or your smart link — the post is the magnet, the link is the exit.</li>
        </ul></details>`;
    return;
  }
  // editor view
  const a=EDIT_ART;
  sec.innerHTML=`
    <div class="card">
      <div class="flex" style="justify-content:space-between"><h3 style="margin:0">${a.id?'Edit post':'New post'}</h3>
        <button class="btn sm ghost" onclick="EDIT_ART=null;renderContent()">← back to list</button></div>
      <label style="margin-top:.6rem">Title<input id="ar-title" value="${esc(a.title||'')}" oninput="if(!EDIT_ART.id&&!EDIT_ART._slugTouched)$('#ar-slug').value=slugifyJs(this.value)"></label>
      <label style="margin-top:.5rem">URL slug <span class="muted" style="text-transform:none">— /blog/<b id="slugpv">${esc(a.slug||'')}</b></span>
        <input id="ar-slug" value="${esc(a.slug||'')}" oninput="EDIT_ART._slugTouched=true;$('#slugpv').textContent=slugifyJs(this.value)"></label>
      <label style="margin-top:.5rem">Summary / dek <span class="muted" style="text-transform:none">(1–2 lines; also the Google description)</span><textarea id="ar-dek" style="min-height:54px">${esc(a.dek||'')}</textarea></label>
      <label style="margin-top:.5rem">Body <span class="muted" style="text-transform:none">— Markdown: <code>## Heading</code>, <code>**bold**</code>, <code>- list</code>, <code>[text](url)</code>. Blank line = new paragraph.</span>
        <textarea id="ar-body" style="min-height:320px;font-family:ui-monospace,monospace">${esc(a.body||'')}</textarea></label>
      <div class="row2" style="margin-top:.5rem">
        <label>Tags <span class="muted" style="text-transform:none">(comma-sep)</span><input id="ar-tags" value="${esc(a.tags||'')}" placeholder="ohio, draftkings, bonus"></label>
        <label>Status<select id="ar-status"><option value="draft"${a.status!=='published'?' selected':''}>Draft (hidden)</option><option value="published"${a.status==='published'?' selected':''}>Published (live)</option></select></label>
      </div>
      <label style="margin-top:.5rem">Cover image <span class="muted" style="text-transform:none">(optional)</span>
        <div class="flex"><input id="ar-cover" value="${esc(a.cover_url||'')}" placeholder="/img/123 or https://…" style="flex:1"><button class="btn sm ghost" onclick="uploadCover()">⬆ upload</button></div></label>
      ${a.cover_url?`<img src="${esc(a.cover_url)}" style="max-height:120px;border-radius:.5rem;margin-top:.4rem">`:''}
      <div class="flex" style="margin-top:.8rem">
        <button class="btn" onclick="saveArticle()">💾 Save</button>
        ${a.id&&a.status==='published'?`<a class="btn ghost" href="/blog/${esc(a.slug)}" target="_blank">view live ↗</a>`:''}
        <span class="muted" style="font-size:.82rem">Tip: save as Draft first, preview by publishing, then unpublish if needed.</span>
      </div>
    </div>`;
}
function slugifyJs(s){ return String(s||'').toLowerCase().trim().replace(/['"]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,70); }
function newArticle(){ EDIT_ART={status:'draft'}; renderContent(); }
async function editArticle(id){ const d=await api('/api/admin/articles/'+id); EDIT_ART=d.article||{id}; renderContent(); }
async function delArticle(id,title){ if(!confirm('Delete "'+title+'"? This cannot be undone.')) return; await api('/api/admin/articles/'+id,{method:'DELETE'}); EDIT_ART=null; renderContent(); toast('Deleted'); }
async function uploadCover(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=async()=>{ const f=inp.files&&inp.files[0]; if(!f) return; toast('Uploading…');
    try{ const url=await uploadOneFile(f); if(!url){toast('Upload failed');return;} $('#ar-cover').value=url; toast('Cover set'); }
    catch(e){ toast('Upload failed'); } };
  inp.click();
}
async function saveArticle(){
  const body={ title:$('#ar-title').value.trim(), slug:$('#ar-slug').value.trim(), dek:$('#ar-dek').value.trim(),
    body:$('#ar-body').value, tags:$('#ar-tags').value.trim(), cover_url:$('#ar-cover').value.trim()||null, status:$('#ar-status').value };
  if(!body.title){ toast('Title required'); return; }
  const id=EDIT_ART&&EDIT_ART.id;
  const r=await api('/api/admin/articles'+(id?'/'+id:''),{method:id?'PUT':'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  if(r&&r.error){ toast(r.error); return; }
  toast(body.status==='published'?'Published ✓':'Saved'); EDIT_ART=null; renderContent();
}

loadBooks().then(()=>renderOverview());
</script>
</body>
